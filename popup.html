<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Udyam CSP Helper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; width: 380px; max-height: 520px; overflow: hidden; background: #f5f7fa; color: #1a1a2e; }
    .header { background: #1a1a2e; color: #fff; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    .badge.idle { background: #6c757d; }
    .badge.running { background: #28a745; }
    .badge.paused { background: #ffc107; color: #333; }

    .content { padding: 10px 14px; overflow-y: auto; max-height: 460px; }

    .section { margin-bottom: 10px; background: #fff; border-radius: 6px; padding: 10px 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
    .section-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }

    .person-card { display: flex; justify-content: space-between; align-items: center; }
    .person-name { font-weight: 600; font-size: 14px; }
    .person-aadhaar { color: #888; font-size: 12px; }
    .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
    .status-PENDING { background: #e2e3e5; color: #383d41; }
    .status-PROCESSING { background: #cce5ff; color: #004085; }
    .status-OTP_WAIT { background: #fff3cd; color: #856404; }
    .status-CAPTCHA_WAIT { background: #f8d7da; color: #721c24; }
    .status-FINAL_OTP_WAIT { background: #fff3cd; color: #856404; }
    .status-DONE { background: #d4edda; color: #155724; }
    .status-FAILED { background: #f8d7da; color: #721c24; }
    .status-SKIPPED { background: #e2e3e5; color: #6c757d; }

    .otp-section { margin-top: 8px; }
    .otp-row { display: flex; gap: 6px; margin-top: 6px; }
    .otp-row input { flex: 1; padding: 8px 10px; border: 2px solid #0066cc; border-radius: 4px; font-size: 18px; letter-spacing: 4px; text-align: center; font-weight: 700; outline: none; }
    .otp-row input:focus { border-color: #004999; }
    .btn { padding: 8px 16px; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn-primary { background: #0066cc; color: #fff; }
    .btn-primary:hover { background: #0052a3; }
    .btn-success { background: #28a745; color: #fff; }
    .btn-warning { background: #ffc107; color: #333; }
    .btn-danger { background: #dc3545; color: #fff; }
    .btn-secondary { background: #6c757d; color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }

    .controls { display: flex; gap: 6px; flex-wrap: wrap; }
    .controls .btn { flex: 1; text-align: center; }

    .queue { max-height: 180px; overflow-y: auto; }
    .queue-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #f0f0f0; font-size: 12px; }
    .queue-item:last-child { border-bottom: none; }
    .queue-item.current { background: #fffde7; margin: 0 -12px; padding: 4px 12px; border-radius: 4px; }
    .queue-name { font-weight: 500; }
    .queue-urn { font-size: 10px; color: #28a745; }

    .progress-bar { height: 4px; background: #e9ecef; border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .progress-bar .fill { height: 100%; background: #28a745; border-radius: 2px; transition: width 0.3s; }

    .captcha-image { max-width: 100%; border: 1px solid #ddd; border-radius: 4px; margin-top: 6px; }
    .hidden { display: none !important; }

    .msg { font-size: 12px; padding: 6px 10px; border-radius: 4px; margin-top: 6px; }
    .msg.done { background: #d4edda; color: #155724; }
    .msg.error { background: #f8d7da; color: #721c24; }
    .msg.info { background: #cce5ff; color: #004085; }

    .footer-link { text-align: center; padding: 8px; font-size: 11px; }
    .footer-link a { color: #888; text-decoration: none; }
    .footer-link a:hover { color: #0066cc; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📋 Udyam CSP</h1>
    <span id="statusBadge" class="badge idle">Idle</span>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="section" id="statsSection">
      <div style="display:flex;justify-content:space-between;font-size:12px;">
        <span>✅ Done: <strong id="doneCount">0</strong></span>
        <span>⏳ Remaining: <strong id="remainingCount">0</strong></span>
        <span>❌ Failed: <strong id="failedCount">0</strong></span>
      </div>
      <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <!-- Current person -->
    <div class="section" id="currentSection">
      <div class="section-title">Current</div>
      <div class="person-card">
        <div>
          <div class="person-name" id="currentName">—</div>
          <div class="person-aadhaar" id="currentAadhaar">—</div>
        </div>
        <span class="status-badge" id="currentStatus">Pending</span>
      </div>

      <!-- OTP input -->
      <div id="otpArea" class="otp-section hidden">
        <div style="font-size:12px;font-weight:600;color:#0066cc;">📱 Enter OTP from person's phone:</div>
        <div class="otp-row">
          <input id="otpInput" type="text" maxlength="6" inputmode="numeric" pattern="\d*" autocomplete="off" placeholder="000000">
          <button id="otpSubmitBtn" class="btn btn-primary">Submit</button>
        </div>
        <div style="margin-top:4px;display:flex;gap:4px;">
          <button id="otpResendBtn" class="btn btn-sm btn-warning">Resend OTP</button>
          <button id="otpCancelBtn" class="btn btn-sm btn-secondary">Skip Person</button>
        </div>
      </div>

      <!-- CAPTCHA area -->
      <div id="captchaArea" class="otp-section hidden">
        <div style="font-size:12px;font-weight:600;color:#dc3545;">🔒 CAPTCHA detected — solve below:</div>
        <img id="captchaImg" class="captcha-image" src="" alt="CAPTCHA">
        <div class="otp-row">
          <input id="captchaInput" type="text" autocomplete="off" placeholder="Enter CAPTCHA text">
          <button id="captchaSubmitBtn" class="btn btn-success">Submit</button>
        </div>
      </div>

      <!-- Final OTP area -->
      <div id="finalOtpArea" class="otp-section hidden">
        <div style="font-size:12px;font-weight:600;color:#0066cc;">📧 Final OTP sent — enter below:</div>
        <div class="otp-row">
          <input id="finalOtpInput" type="text" maxlength="6" inputmode="numeric" pattern="\d*" autocomplete="off" placeholder="000000">
          <button id="finalOtpSubmitBtn" class="btn btn-primary">Submit</button>
        </div>
      </div>

      <!-- Result message -->
      <div id="resultMsg" class="msg hidden"></div>
    </div>

    <!-- Controls -->
    <div class="section">
      <div class="controls" id="controlsArea">
        <button id="startBtn" class="btn btn-success">▶ Start</button>
        <button id="pauseBtn" class="btn btn-warning hidden">⏸ Pause</button>
        <button id="skipBtn" class="btn btn-secondary">⏭ Skip</button>
        <button id="retryBtn" class="btn btn-danger">↻ Retry</button>
      </div>
    </div>

    <!-- Queue list -->
    <div class="section">
      <div class="section-title">Queue (<span id="queueCount">0</span>)</div>
      <div class="queue" id="queueList"></div>
    </div>

    <div class="footer-link">
      <a href="#" id="optionsLink">⚙️ Options</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
